[ants_decomposition]
x_split=${CYLC_TASK_PARAM_split}
y_split=${CYLC_TASK_PARAM_split}

[ants_logging]
enabled=True

[ants_metadata]
history=${CYLC_WORKFLOW_ID}@${ROSE_SUITE_REVISION}:${ROSE_TASK_NAME}

[command]
default=ants-launch ancil_2anc.py \
       =${source} --grid-staggering ${grid_staggering} -o ${output} \
       =--ants-config ${ANTS_CONFIG} --ignore-metadata-files

[env]
ANTS_CONFIG=rose-app-run.conf
grid_staggering=6
output=${ROSE_DATA}/${ROSE_TASK_NAME}
source=${TEST_SOURCES_DIR}/ancil_2anc/n96e_orca_land_cover_fraction

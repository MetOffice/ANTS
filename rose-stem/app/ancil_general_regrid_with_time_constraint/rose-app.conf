[ants_decomposition]
x_split=${CYLC_TASK_PARAM_split}
y_split=${CYLC_TASK_PARAM_split}

[ants_logging]
enabled=True

[ants_metadata]
history=${CYLC_WORKFLOW_ID}@${ROSE_SUITE_REVISION}:${ROSE_TASK_NAME}

[ants_regridding_horizontal]
scheme=TwoStage

[command]
default=ants-launch ancil_general_regrid.py \
       =${source} -o ${output} --ants-config ${ANTS_CONFIG} --target-${target_type} ${target} \
       =--begin ${begin} --end ${end} --search-method ${search_method}

[env]
ANTS_CONFIG=rose-app-run.conf
begin=1985
end=1986
output=${ROSE_DATA}/${ROSE_TASK_NAME}
search_method=${CYLC_TASK_PARAM_fill}
source=${TEST_SOURCES_DIR}/ancil_general_regrid_with_time_constraint/time_constraint.nc
target=${TEST_SOURCES_DIR}/ancil_general_regrid_with_time_constraint/qrparm.mask.nc
target_type=lsm
